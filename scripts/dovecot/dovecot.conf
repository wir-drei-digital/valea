# Throwaway Dovecot config for `just mail-dev` (Task 19, Phase 4 manual E2E).
#
# A full standalone config — no `!include conf.d/*` — so nothing from the
# stock dovecot/dovecot image's default config.d can surprise us. Mounted
# read-only over the image's own /etc/dovecot/dovecot.conf; see the Justfile
# for the exact `docker run` invocation and the fixture-TLS-trust story
# (why the stock image's self-signed cert does NOT work against Valea's
# client, and what the developer runs instead of it).
#
# Syntax targets Dovecot 2.3 (see the Justfile's `mail-dev` comment for why
# the image is pinned to the `dovecot/dovecot:2.3` tag, not `latest` — 2.4
# renamed several of the directives used below). Lint against that pinned
# image: `docker run --rm -it dovecot/dovecot:2.3 dovecot -c
# /path/to/this/file -n`. Authored and shape-checked this way but NOT
# live-verified in this task — actually booting the container is the
# controller's live acceptance pass, not this task's (see Justfile comment
# + task-19-report).

protocols = imap

# IMAPS only (port 993) — matches the mail phase's "TLS mandatory" safety
# invariant (Valea.Mail.ImapClient always dials verify_peer TLS; it never
# speaks plaintext IMAP or STARTTLS). Plaintext port 143 is explicitly
# disabled below rather than merely left unadvertised.
listen = *
ssl = required
ssl_cert = </etc/dovecot/tls/server.pem
ssl_key = </etc/dovecot/tls/server.key

service imap-login {
  inet_listener imap {
    port = 0
  }
  inet_listener imaps {
    port = 993
    ssl = yes
  }
}

# One throwaway account: mara / marapass. `passdb { driver = static }`
# accepts this password for ANY username, which is fine for a disposable
# container that's never reachable outside `localhost:3993` — matches the
# Justfile's `mail-dev` doc comment. `userdb { driver = static }` mirrors it
# with a raw numeric uid/gid (no /etc/passwd entry needed inside the image).
passdb {
  driver = static
  args = password=marapass
}

userdb {
  driver = static
  args = uid=1000 gid=1000 home=/home/vmail/%u
}

first_valid_uid = 1000
last_valid_uid = 1000

# `~` below resolves to the userdb `home` above. Folders (AI/Review,
# AI/Processed, Drafts) are NOT pre-created here — the app's own connection
# doctor creates the missing `AI/*` ones on demand ("Create AI folders");
# see `Valea.Mail.Doctor.create_folders/1`.
mail_location = maildir:~/Maildir

namespace inbox {
  inbox = yes
  separator = /
}
