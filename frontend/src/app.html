<!doctype html>
<!-- Light-only app (DESIGN_SYSTEM: "Light only; dark mode deferred").
     color-scheme drives UA chrome (scrollbars, form controls); the inline
     background covers first paint + overscroll before layout.css loads. -->
<html lang="en" style="background:#fbf8f1">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<meta name="color-scheme" content="light" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
