id: post_session_followup
name: Post-Session Follow-up
description: Drafts a follow-up email after a completed client session.
enabled: true
trigger:
  type: manual
  source: calendar.completed
sources:
  - id: completed_event
    type: calendar
    required: true
  - id: client_page
    type: icm
    path: icm/Clients/*
  - id: tone_guide
    type: icm
    path: icm/Tone & Voice/Email Tone Guide.md
  - id: followup_template
    type: icm
    path: icm/Templates/Follow-up Email.md
steps:
  - id: summarize_session
    instruction: Summarize what was discussed and any commitments made.
  - id: draft_followup
    instruction: >
      Draft a warm follow-up email using the tone guide and the client's
      open commitments.
  - id: create_approval_item
    instruction: Create a pending approval item. Do not send.
outputs:
  - type: approval_item
    schema: queue_item
approval:
  required: true
  reason: Follow-up emails must be reviewed before sending.
  actions:
    - create_email_draft
    - send_email
risk_level: medium
audit:
  log_sources: true
  log_inputs: true
  log_outputs: true
  log_agent: true
