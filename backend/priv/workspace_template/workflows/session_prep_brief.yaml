id: session_prep_brief
name: Session Prep Brief
description: Prepares a short briefing before an upcoming client session.
enabled: true
trigger:
  type: manual
  source: calendar.selected
sources:
  - id: current_event
    type: calendar
    required: true
  - id: client_page
    type: icm
    path: icm/Clients/*
  - id: discovery_call_template
    type: icm
    path: icm/Templates/Discovery Call Reply.md
  - id: followup_template
    type: icm
    path: icm/Templates/Follow-up Email.md
steps:
  - id: gather_context
    instruction: Gather the client's open commitments and recent session history.
  - id: summarize_last_session
    instruction: Summarize what happened in the most recent session, if any.
  - id: draft_brief
    instruction: >
      Draft a short prep brief: what to check in on, what's outstanding,
      and any useful context for the upcoming session.
outputs:
  - type: prep_brief
    schema: prep_brief
approval:
  required: false
  reason: Prep briefs are informational only and are not sent anywhere.
  actions: []
risk_level: low
audit:
  log_sources: true
  log_inputs: true
  log_outputs: true
  log_agent: true
